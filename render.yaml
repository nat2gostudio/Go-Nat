services:
  - type: web
    name: go-nat-app
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: MONGO_URL
        sync: false           # You will paste the MongoDB Atlas connection string here
      - key: DB_NAME
        value: gonat_production
      - key: JWT_SECRET
        generateValue: true   # Render auto-generates a secure random secret
      - key: ADMIN_EMAIL
        sync: false           # Your login email
      - key: ADMIN_PASSWORD
        sync: false           # Your login password
      - key: APP_URL
        sync: false           # Set AFTER first deploy — paste the *.onrender.com URL here
      - key: ENVIRONMENT
        value: production
